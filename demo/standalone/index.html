<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@fiduswriter/bibliography-manager — Standalone Demo</title>

  <!-- Layer 1: fwtoolkit base custom properties -->
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/colors.css" />

  <!-- Layer 3: fwtoolkit component CSS (subset used by bibliography) -->
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/forms.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/buttons.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/dialog.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/data_table.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/dialog_table.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/common.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/pulldown.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/ui_tabs.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/content_menu.css" />
  <link rel="stylesheet" href="../../node_modules/fwtoolkit/css/loader.css" />

  <!-- Layer 4: Bibliography additive overrides -->
  <link rel="stylesheet" href="../../css/colors.css" />
  <link rel="stylesheet" href="../../css/forms.css" />

  <!-- Layer 7: Bibliography component CSS -->
  <link rel="stylesheet" href="../../css/bibliography.css" />

  <style>
    body {
      font-family: Lato, sans-serif;
      padding: 20px;
      background: var(--main-background-color, #f2f2f2);
      color: var(--main-text-color, #2c2723);
    }
    .demo-section {
      margin: 24px 0;
      padding: 16px;
      background: var(--cs-white-background, #fff);
      border: 1px solid var(--cs-white-border, #ccc);
      border-radius: 4px;
    }
    .demo-section h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--cs-5-background, #4c6860);
    }
  </style>
</head>
<body>
  <h1>@fiduswriter/bibliography-manager — Standalone Demo</h1>
  <p>
    This page loads bibliography CSS from the package and its fwtoolkit
    dependency. No <code>@fiduswriter/frontend</code> is needed.
  </p>

  <div class="demo-section">
    <h2>Custom property verification</h2>
    <p>Tokenfield should use <code>var(--tokenfield-color)</code>:</p>
    <div style="color:var(--tokenfield-color,#555);font-size:14px;padding:8px;background:var(--cs-light-background-hover,#e0e0e0);border-radius:4px;">
      Example tokenfield text color (--tokenfield-color)
    </div>
  </div>

  <script type="module">
    import { initSettings, addAlert } from '../../node_modules/fwtoolkit/dist/index.js'

    initSettings({
      staticUrl: (path) => `/static/${path}`,
      getCsrfToken: () => null,
      gettext: (msgid) => msgid,
    })

    addAlert('success', '@fiduswriter/bibliography-manager standalone demo loaded successfully.')
    console.log('✅ fwtoolkit initialized. Bibliography CSS loaded from local css/ directory.')
  </script>
</body>
</html>
